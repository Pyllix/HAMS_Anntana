version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: hams-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - hams_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  hams_postgres_data: